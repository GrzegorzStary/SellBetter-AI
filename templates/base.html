{% load static %}
<!DOCTYPE html>
<html lang="en" class="h-full scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}AI Listing Generator{% endblock %}</title>

    <meta name="description" content="{% block meta_description %}Generate better marketplace listings with AI.{% endblock %}">

    <link rel="stylesheet" href="{% static 'assets/css/style.css' %}">

</head>

<body class="min-h-full bg-gradient-to-b from-white via-gray-50 to-gray-100 text-gray-900 antialiased">
    <div class="flex min-h-screen flex-col">
        {% include "includes/navbar.html" %}

        <main class="site-main flex-1">
            {% block content %}{% endblock %}
        </main>

        {% include "includes/footer.html" %}
    </div>

    <script src="{% static 'assets/js/base.js' %}"></script>
    <script src="{% static 'assets/js/navbar.js' %}"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
