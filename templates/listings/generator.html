<!DOCTYPE html>
<html>
<head>
<title>AI Listing Generator</title>

<button onclick="copyText()" 
class="bg-blue-600 text-white px-4 py-2 rounded">
Copy Listing
</button>

<script>

function copyText() {

const text = `
{{ result.title }}

{{ result.description }}

{{ result.bullet_points }}

Tags:
{{ result.tags }}
`

navigator.clipboard.writeText(text)

alert("Listing copied!")

}

</script>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-100">

<div class="max-w-4xl mx-auto mt-10 bg-white p-8 rounded-xl shadow">

<h1 class="text-3xl font-bold mb-6">
AI Listing Generator
</h1>

<form method="post" enctype="multipart/form-data" class="space-y-4">

    {% csrf_token %}
    
    {{ form.as_p }}
    
    <button class="bg-black text-white px-6 py-3 rounded-lg">
    Generate Listing
    </button>
    
    </form>

{% if result %}

<div class="mt-10 border-t pt-6">

<h2 class="text-2xl font-semibold mb-4">
{{ result.title }}
</h2>

<p class="mb-4">
{{ result.description }}
</p>

<h3 class="font-semibold">Bullet Points</h3>

<pre class="bg-gray-100 p-4 rounded">
{{ result.bullet_points }}
</pre>

<h3 class="mt-4 font-semibold">Tags</h3>

<p>{{ result.tags }}</p>

</div>

{% endif %}

</div>

</body>
</html>
